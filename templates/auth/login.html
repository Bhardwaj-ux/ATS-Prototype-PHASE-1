{% extends 'base.html' %}
{% block title %}Login | Elecbits ATS{% endblock %}
{% block auth_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="card" style="width:100%;max-width:420px;">
        <h1 class="page-title">Elecbits Sign In</h1>
        <p class="muted">Access the Elecbits ATS dashboard and applicant pipeline.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit">Login</button>
        </form>
    </div>
</div>
{% endblock %}
